services:
  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: menuqr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-menuqr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-menuqr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-menuqr} -d ${POSTGRES_DB:-menuqr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - menuqr-network

  # ─────────────────────────────────────────
  # Database Migrations — jalankan drizzle-kit migrate
  # Pakai image node ringan, mount source code langsung
  # ─────────────────────────────────────────
  migrate:
    image: node:20-alpine
    container_name: menuqr-migrate
    working_dir: /app
    command: sh -c "npm install --ignore-scripts && npx drizzle-kit migrate"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-menuqr}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-menuqr}
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - menuqr-network
    restart: on-failure

  # ─────────────────────────────────────────
  # Next.js App
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: menuqr-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-menuqr}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-menuqr}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      # Persist uploaded images
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - menuqr-network

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy (opsional, aktifkan jika pakai domain)
  # ─────────────────────────────────────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: menuqr-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - menuqr-network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  menuqr-network:
    driver: bridge
